name: Build AudioSwitcher

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore FortyOne.AudioSwitcher.sln

      - name: Stub .NET 4.0 Client Profile reference assemblies
        shell: powershell
        run: |
          $refRoot = "${env:ProgramFiles(x86)}\Reference Assemblies\Microsoft\Framework\.NETFramework"
          $v40    = "$refRoot\v4.0"
          $client = "$v40\Profile\Client"
          New-Item -ItemType Directory -Force -Path "$client\RedistList" | Out-Null
          $xml = '<?xml version="1.0" encoding="utf-8"?>'
          $xml += '<FileList Redist="Microsoft-.NETFramework-v4.0-Client"'
          $xml += ' Name=".NET Framework 4 Client Profile"'
          $xml += ' TargetFrameworkDirectory="..\" />'
          Set-Content "$client\RedistList\FrameworkList.xml" -Value $xml -Encoding UTF8
          if (-not (Test-Path "$v40\mscorlib.dll")) {
            Write-Host "Copying v4.5.2 reference assemblies into v4.0 folder..."
            Get-ChildItem "$refRoot\v4.5.2\*.dll" | ForEach-Object {
              $dest = "$v40\$($_.Name)"
              if (-not (Test-Path $dest)) { Copy-Item $_.FullName $dest }
            }
          }
          Write-Host "Done - stub at $client"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: |
          msbuild FortyOne.AudioSwitcher.sln `
            /p:Configuration=Release `
            /p:Platform=x86 `
            /p:SignAssembly=false `
            /p:RunPostBuildEvent=Never `
            /m `
            /v:minimal

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioSwitcher-Release-x86
          path: FortyOne.AudioSwitcher/bin/Release/
          if-no-files-found: error
          retention-days: 30
