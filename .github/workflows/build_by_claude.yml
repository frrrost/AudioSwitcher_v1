name: Build AudioSwitcher

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        working-directory: ${{ github.workspace }}
        run: nuget restore FortyOne.AudioSwitcher.sln

      - name: Copy packages into Resources folder
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          # The GUI csproj has a Resources\ folder with DLLs checked in,
          # and HintPaths pointing to ..\packages\...\net45\.
          # Overwrite the Resources copies with the freshly-restored packages
          # so both resolution paths point to the same binaries.
          $res = "FortyOne.AudioSwitcher\Resources"
          $map = @{
            "packages\AudioSwitcher.AudioApi.4.0.0-alpha5\lib\net45\AudioSwitcher.AudioApi.dll"               = "$res\AudioSwitcher.AudioApi.dll"
            "packages\AudioSwitcher.AudioApi.CoreAudio.4.0.0-alpha5\lib\net45\AudioSwitcher.AudioApi.CoreAudio.dll" = "$res\AudioSwitcher.AudioApi.CoreAudio.dll"
            "packages\fastJSON.2.1.21\lib\net40\fastjson.dll"                                                  = "$res\fastjson.dll"
            "packages\WindowsInput.0.2.0.0\lib\net40\WindowsInput.dll"                                        = "$res\WindowsInput.dll"
          }
          foreach ($src in $map.Keys) {
            $dst = $map[$src]
            if (Test-Path $src) {
              Write-Host "Copy $src -> $dst"
              Copy-Item $src $dst -Force
            } else {
              Write-Warning "Source not found: $src"
              Get-ChildItem (Split-Path $src | Split-Path) -Recurse -Filter "*.dll" |
                ForEach-Object { Write-Host "  found: $($_.FullName)" }
            }
          }

      - name: Stub .NET 4.0 reference assemblies
        shell: powershell
        run: |
          $refRoot = "${env:ProgramFiles(x86)}\Reference Assemblies\Microsoft\Framework\.NETFramework"
          $v40     = "$refRoot\v4.0"
          $v452    = "$refRoot\v4.5.2"
          $client  = "$v40\Profile\Client"

          New-Item -ItemType Directory -Force -Path "$v40\RedistList"    | Out-Null
          New-Item -ItemType Directory -Force -Path "$client\RedistList" | Out-Null

          $xml  = '<?xml version="1.0" encoding="utf-8"?>'
          $xml += '<FileList Redist="Microsoft-.NETFramework-v4.0"'
          $xml += ' Name=".NET Framework 4" TargetFrameworkDirectory="..\" />'
          Set-Content "$v40\RedistList\FrameworkList.xml" -Value $xml -Encoding UTF8

          $xmlC  = '<?xml version="1.0" encoding="utf-8"?>'
          $xmlC += '<FileList Redist="Microsoft-.NETFramework-v4.0-Client"'
          $xmlC += ' Name=".NET Framework 4 Client Profile" TargetFrameworkDirectory="..\" />'
          Set-Content "$client\RedistList\FrameworkList.xml" -Value $xmlC -Encoding UTF8

          Get-ChildItem "$v452\*.dll" | ForEach-Object {
            Copy-Item $_.FullName "$v40\$($_.Name)" -Force
          }
          Write-Host "Done - $(Get-ChildItem "$v40\*.dll" | Measure-Object | Select-Object -Expand Count) DLLs in $v40"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        working-directory: ${{ github.workspace }}
        run: |
          msbuild FortyOne.AudioSwitcher.sln `
            /p:Configuration=Release `
            /p:Platform=x86 `
            /p:SignAssembly=false `
            /p:RunPostBuildEvent=Never `
            /m `
            /v:minimal

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioSwitcher-Release-x86
          path: FortyOne.AudioSwitcher/bin/Release/
          if-no-files-found: error
          retention-days: 30
