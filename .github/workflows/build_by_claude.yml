name: Build AudioSwitcher

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        working-directory: ${{ github.workspace }}
        run: nuget restore FortyOne.AudioSwitcher.sln

      - name: Stub .NET 4.0 reference assemblies
        shell: powershell
        run: |
          $refRoot = "${env:ProgramFiles(x86)}\Reference Assemblies\Microsoft\Framework\.NETFramework"
          $v40     = "$refRoot\v4.0"
          $v452    = "$refRoot\v4.5.2"
          $client  = "$v40\Profile\Client"

          New-Item -ItemType Directory -Force -Path "$v40\RedistList"    | Out-Null
          New-Item -ItemType Directory -Force -Path "$client\RedistList" | Out-Null

          $xml  = '<?xml version="1.0" encoding="utf-8"?>'
          $xml += '<FileList Redist="Microsoft-.NETFramework-v4.0"'
          $xml += ' Name=".NET Framework 4" TargetFrameworkDirectory="..\" />'
          Set-Content "$v40\RedistList\FrameworkList.xml" -Value $xml -Encoding UTF8

          $xmlC  = '<?xml version="1.0" encoding="utf-8"?>'
          $xmlC += '<FileList Redist="Microsoft-.NETFramework-v4.0-Client"'
          $xmlC += ' Name=".NET Framework 4 Client Profile" TargetFrameworkDirectory="..\" />'
          Set-Content "$client\RedistList\FrameworkList.xml" -Value $xmlC -Encoding UTF8

          Get-ChildItem "$v452\*.dll" | ForEach-Object {
            Copy-Item $_.FullName "$v40\$($_.Name)" -Force
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Build only the GUI project at diagnostic verbosity so we can see
      # exactly which HintPaths MSBuild tried and why they failed.
      # This will produce a large log — we only care about lines mentioning
      # AudioSwitcher.AudioApi or "not found" / "HintPath".
      - name: Build GUI project (diagnostic verbosity)
        working-directory: ${{ github.workspace }}
        run: |
          msbuild FortyOne.AudioSwitcher\FortyOne.AudioSwitcher.GUI.csproj `
            /p:Configuration=Release `
            /p:Platform=x86 `
            /p:SignAssembly=false `
            /p:RunPostBuildEvent=Never `
            /v:diag `
            2>&1 | Select-String -Pattern "AudioSwitcher\.AudioApi|HintPath|not found|Considered|Resolved|WindowsInput|fastjson" `
            | ForEach-Object { $_.Line }
        continue-on-error: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioSwitcher-Release-x86
          path: FortyOne.AudioSwitcher/bin/Release/
          if-no-files-found: warn
          retention-days: 30
