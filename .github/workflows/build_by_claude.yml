name: Build AudioSwitcher

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        working-directory: ${{ github.workspace }}
        run: nuget restore FortyOne.AudioSwitcher.sln

      - name: Diagnose package paths
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          Write-Host "=== Searching entire workspace for AudioSwitcher.AudioApi.dll ==="
          Get-ChildItem -Path "D:\a" -Recurse -Filter "AudioSwitcher.AudioApi.dll" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host $_.FullName }

          Write-Host ""
          Write-Host "=== packages\ folder contents (if exists) ==="
          if (Test-Path "packages") {
            Get-ChildItem packages -Directory | ForEach-Object { Write-Host "  $($_.Name)" }
          } else {
            Write-Host "  [packages\ does not exist at repo root]"
          }

          Write-Host ""
          Write-Host "=== nuget.config files in workspace ==="
          Get-ChildItem -Path "D:\a\AudioSwitcher_v1" -Recurse -Filter "nuget.config" -ErrorAction SilentlyContinue |
            ForEach-Object {
              Write-Host "--- $($_.FullName) ---"
              Get-Content $_.FullName | ForEach-Object { Write-Host $_ }
            }

      - name: Stub .NET 4.0 reference assemblies
        shell: powershell
        run: |
          $refRoot = "${env:ProgramFiles(x86)}\Reference Assemblies\Microsoft\Framework\.NETFramework"
          $v40     = "$refRoot\v4.0"
          $v452    = "$refRoot\v4.5.2"
          $client  = "$v40\Profile\Client"

          New-Item -ItemType Directory -Force -Path "$v40\RedistList"    | Out-Null
          New-Item -ItemType Directory -Force -Path "$client\RedistList" | Out-Null

          $xml  = '<?xml version="1.0" encoding="utf-8"?>'
          $xml += '<FileList Redist="Microsoft-.NETFramework-v4.0"'
          $xml += ' Name=".NET Framework 4" TargetFrameworkDirectory="..\" />'
          Set-Content "$v40\RedistList\FrameworkList.xml" -Value $xml -Encoding UTF8

          $xmlC  = '<?xml version="1.0" encoding="utf-8"?>'
          $xmlC += '<FileList Redist="Microsoft-.NETFramework-v4.0-Client"'
          $xmlC += ' Name=".NET Framework 4 Client Profile" TargetFrameworkDirectory="..\" />'
          Set-Content "$client\RedistList\FrameworkList.xml" -Value $xmlC -Encoding UTF8

          Get-ChildItem "$v452\*.dll" | ForEach-Object {
            Copy-Item $_.FullName "$v40\$($_.Name)" -Force
          }
          Write-Host "Done - $(Get-ChildItem "$v40\*.dll" | Measure-Object | Select-Object -Expand Count) DLLs in $v40"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        working-directory: ${{ github.workspace }}
        run: |
          msbuild FortyOne.AudioSwitcher.sln `
            /p:Configuration=Release `
            /p:Platform=x86 `
            /p:SignAssembly=false `
            /p:RunPostBuildEvent=Never `
            /m `
            /v:minimal

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioSwitcher-Release-x86
          path: FortyOne.AudioSwitcher/bin/Release/
          if-no-files-found: error
          retention-days: 30
